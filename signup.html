<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - F1 Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    
    <div class="container">
        <h2>회원가입</h2>
        <form id="signupForm" onsubmit="handleSignup(event)">
            <div class="input-group">
                <label for="name">이름</label>
                <input type="text" id="name" name="name" placeholder="홍길동" required autocomplete="name">
            </div>
            <div class="input-group">
                <label for="email">이메일 주소</label>
                <input type="email" id="email" name="email" placeholder="email@example.com" required autocomplete="email">
            </div>
            <div class="input-group">
                <label for="password">비밀번호</label>
                <input type="password" id="password" name="password" placeholder="********" required autocomplete="new-password">
            </div>
            <div class="input-group">
                <label for="confirm-password">비밀번호 확인</label>
                <input type="password" id="confirm-password" name="confirmPassword" placeholder="********" required autocomplete="new-password">
            </div>
            <button type="submit" class="btn">회원가입 완료</button>
        </form>
        
        <div class="links">
            <p>이미 계정이 있으신가요? <a href="#" onclick="navigateTo('login.html')">로그인</a></p>
            <a href="#" onclick="navigateTo('index.html')" class="back-link">← 처음으로</a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
